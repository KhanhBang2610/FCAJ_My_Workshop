  <text class="small" x="510" y="207" text-anchor="middle">Route 53</text>

  <rect class="box" x="650" y="120" width="120" height="96"/>
  <rect class="svc-purple" x="680" y="130" width="60" height="60" rx="8"/>
  <circle cx="710" cy="160" r="24" fill="none" stroke="#ffffff" stroke-width="3"/>
  <path d="M686 160 H734 M710 136 C696 150 696 170 710 184 M710 136 C724 150 724 170 710 184" stroke="#ffffff" stroke-width="2" fill="none"/>
  <text class="small" x="710" y="207" text-anchor="middle">CloudFront</text>

  <rect class="box" x="940" y="120" width="190" height="112"/>
  <rect class="svc-green" x="1005" y="128" width="62" height="62" rx="8"/>
  <path d="M1016 142 C1016 133 1056 133 1056 142 L1052 178 C1050 186 1022 186 1020 178 Z" fill="none" stroke="#ffffff" stroke-width="3"/>
  <path d="M1016 142 C1016 151 1056 151 1056 142" fill="none" stroke="#ffffff" stroke-width="3"/>
  <text class="small" x="1035" y="214" text-anchor="middle">Private S3 Bucket</text>
  <text class="tiny" x="1035" y="232" text-anchor="middle">Static website assets</text>

  <rect class="box" x="600" y="218" width="96" height="88"/>
  <rect class="svc-red" x="624" y="226" width="48" height="48" rx="6"/>
  <path d="M648 236 C633 243 633 260 648 266 C663 260 663 243 648 236 Z" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text class="small" x="648" y="294" text-anchor="middle">WAF</text>

