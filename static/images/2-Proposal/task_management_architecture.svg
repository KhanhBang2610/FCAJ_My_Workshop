  <text class="small" x="1125" y="562" text-anchor="middle">Data</text>
  <rect class="box" x="1085" y="610" width="94" height="88"/>
  <rect class="svc-pink" x="1108" y="620" width="48" height="48" rx="5"/>
  <path d="M1116 633 C1116 626 1148 626 1148 633 V656 C1148 663 1116 663 1116 656 Z" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <path d="M1116 633 C1116 640 1148 640 1148 633 M1116 644 C1116 651 1148 651 1148 644" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <text class="small" x="1132" y="690" text-anchor="middle">DynamoDB</text>
