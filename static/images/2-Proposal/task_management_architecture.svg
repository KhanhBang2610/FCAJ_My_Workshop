  <rect class="group-blue" x="225" y="440" width="185" height="305"/>
  <text class="small" x="318" y="465" text-anchor="middle">CI/CD Pipeline</text>
  <rect class="box" x="278" y="492" width="80" height="68"/>
  <rect class="svc-purple" x="298" y="502" width="40" height="40" rx="5"/>
  <path d="M306 516 H330 M306 528 H330 M318 510 L310 534 M323 510 L331 534" stroke="#ffffff" stroke-width="2"/>
