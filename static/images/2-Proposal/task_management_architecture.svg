<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Task Management System AWS Architecture</title>
  <desc id="desc">Serverless architecture with Route 53, CloudFront, private S3, Cognito, AppSync, Lambda, DynamoDB, CloudWatch, CodePipeline, CodeBuild, CloudFormation, and GitHub.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202124"/>
    </marker>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 500 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; rx: 8; }
      .aws { fill: #ffffff; stroke: #232f3e; stroke-width: 2.5; }
      .region { fill: #f8fafc; stroke: #6b7280; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .group-blue { fill: #e8f1ff; stroke: #60a5fa; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .group-green { fill: #e9f7ec; stroke: #6fcf97; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .group-yellow { fill: #fff4cc; stroke: #f6c945; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .group-red { fill: #ffe4e4; stroke: #f87171; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .svc-purple { fill: #7c3aed; }
      .svc-pink { fill: #db2777; }
      .svc-orange { fill: #f97316; }
      .svc-green { fill: #65a30d; }
      .svc-blue { fill: #2563eb; }
      .svc-red { fill: #e11d48; }
      .svc-gray { fill: #4b5563; }
      .white { fill: #ffffff; }
      .line { stroke: #202124; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #202124; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .muted-line { stroke: #6b7280; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
      .dashed-line { stroke: #6b7280; stroke-width: 1.6; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <rect x="650" y="18" width="300" height="44" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
  <text class="title" x="800" y="49" text-anchor="middle">Task Management System</text>

  <rect class="aws" x="165" y="88" width="1368" height="760"/>
  <rect x="165" y="88" width="42" height="24" fill="#111827"/>
  <text x="186" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">AWS</text>
  <text class="small" x="215" y="106">AWS Cloud</text>

  <rect class="region" x="225" y="300" width="1250" height="505"/>
  <rect x="225" y="300" width="28" height="24" fill="#4b5563"/>
  <text class="tiny" x="265" y="317">Region</text>

  <!-- External actors -->
  <circle cx="70" cy="194" r="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <path d="M70 212 L70 253 M38 253 C43 225 97 225 102 253 Z" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text class="small" x="70" y="276" text-anchor="middle">User</text>
  <text class="small" x="70" y="294" text-anchor="middle">Browser</text>

  <rect x="12" y="608" width="120" height="250" fill="#ffffff" stroke="#6b7280" stroke-dasharray="5 4"/>
  <circle cx="72" cy="662" r="18" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <path d="M72 680 L72 720 M40 720 C45 692 99 692 104 720 Z" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text class="small" x="72" y="746" text-anchor="middle">Developer</text>
