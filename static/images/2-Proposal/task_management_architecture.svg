  <rect class="box" x="278" y="596" width="80" height="68"/>
  <rect class="svc-purple" x="298" y="606" width="40" height="40" rx="5"/>
  <path d="M307 615 H330 L335 628 L326 641 H303 L298 628 Z M307 620 L317 628 L307 636 M321 636 H331" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text class="tiny" x="318" y="659" text-anchor="middle">CodeBuild</text>
  <path d="M318 664 L318 700" class="thin"/>
  <rect class="box" x="265" y="700" width="106" height="70"/>
  <rect class="svc-pink" x="298" y="710" width="40" height="40" rx="5"/>
  <path d="M307 720 H329 V743 H307 Z M312 725 H324 M312 732 H324 M312 739 H320" stroke="#ffffff" stroke-width="2" fill="none"/>
  <text class="tiny" x="318" y="764" text-anchor="middle">CloudFormation</text>

  <!-- Flows -->
  <path d="M102 194 H450" class="line"/>
  <text class="tiny" x="280" y="184" text-anchor="middle">Website request / DNS lookup</text>
  <path d="M570 168 H650" class="line"/>
  <path d="M770 168 H940" class="line"/>
  <path d="M666 218 L692 190" class="thin"/>
  <path d="M780 218 L724 190" class="thin"/>

  <path d="M102 253 H405" class="thin"/>
  <text class="tiny" x="270" y="244" text-anchor="middle">Login / JWT</text>
  <path d="M529 380 H610" class="thin"/>
  <text class="tiny" x="570" y="368" text-anchor="middle">JWT auth</text>

  <path d="M102 225 H610" class="line"/>
  <text class="tiny" x="360" y="215" text-anchor="middle">GraphQL query / mutation / subscription + JWT</text>
  <path d="M675 476 L682 615" class="line"/>
  <path d="M728 654 H1085" class="line"/>
  <path d="M1132 610 C1132 520 1210 420 1300 420" class="muted-line"/>
  <path d="M740 424 H1300" class="muted-line"/>
  <path d="M728 632 C920 632 1120 520 1300 452" class="muted-line"/>

  <path d="M95 842 H225" class="line"/>
  <path d="M371 735 H520 C520 700 548 682 636 670" class="dashed-line"/>
  <path d="M371 735 H504 C504 395 610 424 610 424" class="dashed-line"/>
  <path d="M371 735 H508 C508 330 467 330 467 330" class="dashed-line"/>
  <path d="M371 735 H980 C980 698 1085 690 1085 654" class="dashed-line"/>
  <path d="M371 735 H1215 C1215 480 1300 452 1300 452" class="dashed-line"/>
  <path d="M371 735 H910 C910 240 940 204 940 184" class="dashed-line"/>
  <text class="tiny" x="490" y="720">Deploy infrastructure and application changes</text>
</svg>
