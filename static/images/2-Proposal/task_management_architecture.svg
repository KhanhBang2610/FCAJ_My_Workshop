  <path d="M1108 752 C1108 733 1126 724 1142 732 M1142 732 L1142 717 M1142 732 L1156 727" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  <circle cx="1132" cy="758" r="23" fill="none" stroke="#0ea5e9" stroke-width="3"/>
