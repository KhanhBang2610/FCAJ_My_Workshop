  <circle cx="72" cy="842" r="23" fill="#0ea5e9"/>
  <path d="M58 835 C57 827 65 824 72 830 C79 824 87 827 86 835 C89 840 86 849 78 851 L78 858 L66 858 L66 851 C58 849 55 840 58 835 Z" fill="#ffffff"/>
  <text class="small" x="72" y="881" text-anchor="middle">GitHub</text>

