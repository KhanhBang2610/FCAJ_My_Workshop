  <path d="M468 382 C470 371 490 371 492 382" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text class="small" x="467" y="418" text-anchor="middle">Cognito</text>

  <rect class="box" x="610" y="372" width="130" height="104"/>
  <rect class="svc-pink" x="645" y="382" width="60" height="60" rx="8"/>
  <circle cx="675" cy="412" r="21" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="675" cy="394" r="4" fill="#ffffff"/>
  <circle cx="658" cy="422" r="4" fill="#ffffff"/>
  <circle cx="692" cy="422" r="4" fill="#ffffff"/>
  <path d="M675 398 L660 419 M675 398 L690 419 M662 422 H688" stroke="#ffffff" stroke-width="2.4"/>
