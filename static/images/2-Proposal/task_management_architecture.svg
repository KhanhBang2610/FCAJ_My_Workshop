  <text class="tiny" x="1132" y="818" text-anchor="middle">PITR enabled</text>

  <rect class="group-red" x="1250" y="300" width="190" height="210"/>
  <text class="small" x="1345" y="322" text-anchor="middle">Monitoring</text>
  <text class="small" x="1345" y="340" text-anchor="middle">and Observability</text>
  <rect class="box" x="1300" y="372" width="90" height="92"/>
  <rect class="svc-pink" x="1321" y="382" width="48" height="48" rx="5"/>
  <path d="M1331 410 C1323 409 1321 396 1333 394 C1336 382 1354 382 1357 395 C1367 394 1372 407 1363 414 C1360 421 1343 421 1331 410 Z" fill="none" stroke="#ffffff" stroke-width="2.2"/>
  <circle cx="1355" cy="410" r="9" fill="none" stroke="#ffffff" stroke-width="2.2"/>
  <path d="M1362 417 L1370 425" stroke="#ffffff" stroke-width="2.2"/>
  <text class="small" x="1345" y="452" text-anchor="middle">CloudWatch</text>
  <text class="tiny" x="1345" y="472" text-anchor="middle">Logs | Metrics | Alarms</text>

